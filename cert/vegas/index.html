<div aria-live="polite" id="copyToast">복사되었습니다</div>

<script>
(() => {
  'use strict';
  const code = "6789";
  const toast = document.getElementById('copyToast');

  function showToast(msg) {
    if (!toast) return;
    toast.textContent = msg || '복사되었습니다';
    toast.classList.add('on');
    setTimeout(() => toast.classList.remove('on'), 950);
  }

  async function copyText(v) {
    try {
      await navigator.clipboard.writeText(v);
      showToast('가입코드가 복사되었습니다');
      return true;
    } catch (e) {
      try {
        const ta = document.createElement('textarea');
        ta.value = v; ta.setAttribute('readonly','');
        ta.style.position='fixed'; ta.style.left='-9999px';
        document.body.appendChild(ta);
        ta.select(); document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('가입코드가 복사되었습니다');
        return true;
      } catch (e2) {
        showToast('복사 실패');
        return false;
      }
    }
  }

  // keep utm params (if present) for outbound joins
  try {
    const joinBtn = document.getElementById('joinBtn');
    if (joinBtn && joinBtn.href) {
      const src = new URL(window.location.href);
      const utm = new URLSearchParams(src.search);
      const keep = new URLSearchParams();
      for (const [k,v] of utm.entries()) {
        if (k.startsWith('utm_') || k === 'ref') keep.set(k,v);
      }
      if ([...keep.keys()].length) {
        const u = new URL(joinBtn.href);
        keep.forEach((v,k) => {
          if (!u.searchParams.has(k)) u.searchParams.set(k,v);
        });
        joinBtn.href = u.toString();
      }
    }
  } catch {}

  document.getElementById('copyBtn')?.addEventListener('click', () => {
    copyText(code);
    try { gtag('event', 'copy_code', { code_present: true, vendor: "VEGAS" }); } catch {}
  });

  try { gtag('event','view_vendor_landing', { vendor: "VEGAS" }); } catch {}
})();
</script>
